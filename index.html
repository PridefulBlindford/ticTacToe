<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <button class="start-game" commandfor="name-entry" command="show-modal">Start Game</button>
    <dialog id="name-entry">
        <form action="" method="dialog" class="name-entry-form">
            <div>
                <label for="first-name">What is the firstplayer's name?</label>
                <input type="text" id="first-name" name="first-name">
            </div>
            <div>
                <label for="second-name">What is the second player's name?</label>
                <input type="text" id="second-name" name="second-name">
            </div>
            <div>
                <button commandfor="name-entry" command="close" class="name-entry-button" type="button">Submit</button>
            </div>
        </form>

    </dialog>

<button class="restart-game">Restart Game</button>

    <table>
        <caption>The tic tac toe board</caption>
        <tr>
            <td><button id="1" class="space">empty</button></td>
            <td><button id="2" class="space">empty</button></td>
            <td><button id="3" class="space">empty</button></td>
        </tr>
        <tr>
            <td><button id="4 class=space">empty</button></td>
            <td><button id="5" class="space">empty</button></td>
            <td><button id="66" class="space">empty</button></td>
        </tr>
        <tr>
            <td><button id="7" class="space">empty</button></td>
            <td><button id="8" class="space">empty</button></td>
            <td><button id="9" class="space">empty</button></td>
        </tr>x
    </table>
    <div class="game-result">

    </div>
</body>
</html>
